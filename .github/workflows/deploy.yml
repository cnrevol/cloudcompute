name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Build Jar
      working-directory: devops/projects/webconfrim/java-spring-demo
      run: mvn clean package

    - name: Copy Jar to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "devops/projects/webconfrim/java-spring-demo/target/*.jar"
        target: "/home/ec2-user/app"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /home/ec2-user/app
          docker stop spring-demo || true
          docker rm spring-demo || true
          docker build -t spring-demo /home/ec2-user/app/devops/projects/webconfrim/java-spring-demo
          docker run -d -p 8080:8080 --name spring-demo spring-demo