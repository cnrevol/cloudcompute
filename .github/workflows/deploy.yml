name: Deploy Spring Boot to Elastic Beanstalk

on:
  push:
    branches: [ dev-beanstalk ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Jar
      working-directory: devops/projects/webconfrim/java-spring-demo
      run: mvn clean package

    # 打包为 zip（Beanstalk 要求）
    - name: Prepare deployment package
      run: |
        mkdir deploy
        cp devops/projects/webconfrim/java-spring-demo/target/*.jar deploy/bigbro.jar
        cd deploy
        zip -r app.zip .

    # 部署到 Elastic Beanstalk
    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: bigbro
        environment_name: bigbro-env
        region: ap-northeast-1
        version_label: v-${{ github.run_number }}
        deployment_package: deploy/app.zip