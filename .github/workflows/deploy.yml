name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ 本地构建 Jar
      - name: Build Jar
        working-directory: devops/projects/webconfrim/java-spring-demo
        run: mvn clean package

      # 3️⃣ 上传 Jar 到 EC2
      - name: Copy Jar to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "devops/projects/webconfrim/java-spring-demo/target/*.jar"
          target: "/home/ec2-user/app/java-spring-demo/target"

      # 4️⃣ 在 EC2 上部署 Docker
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app/java-spring-demo

            # 删除旧容器，保证端口释放
            docker rm -f spring-demo || true

            # 构建新镜像，禁用缓存确保最新 Jar
            docker build --no-cache -t spring-demo .

            # 启动新容器
            docker run -d -p 8080:8080 --name spring-demo spring-demo